<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- BandaBets Analytics Dashboard favicon -->
    <link rel="icon" type="image/png" href="https://touchvasgaming.b-cdn.net/banda/bandabetslogo.png" />
    <!-- platform favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BandaBets Analytics Dashboard | platform</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Use main.jsx for compatibility -->
    <!-- Global error/debug overlay for WSOD diagnosis -->
    <div id="global-error-overlay" style="display:block;position:fixed;z-index:99999;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.97);color:#b00020;font-family:monospace;font-size:1.2rem;padding:2rem;overflow:auto;">
      <b>Loading...</b><br><br>
      If you see this message and nothing else, a fatal error may have occurred before the app could render.<br>
      If an error is detected, details will appear here automatically.<br>
      <br>
      <b>Tip:</b> If this message does not disappear, please screenshot this page and send it to your developer.
    </div>
    <script>
      function logWsodError(type, message, stack) {
        var payload = {
          timestamp: new Date().toISOString(),
          type: type,
          message: message,
          stack: stack,
          url: window.location.href,
          userAgent: navigator.userAgent
        };
        // Try to POST to wsod-error-log.json (will only work if server allows it)
        fetch('/wsod-error-log.json', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).catch(function(){});
      }
      window.addEventListener('error', function(event) {
        var overlay = document.getElementById('global-error-overlay');
        overlay.style.display = 'block';
        var msg = event.error ? (event.error.stack || event.error) : event.message;
        overlay.innerHTML = '<b>FATAL ERROR</b><br><br>' +
          '<pre style="white-space:pre-wrap;word-break:break-all;">' + msg + '</pre>' +
          '<br><b>URL:</b> ' + window.location.href +
          '<br><b>User Agent:</b> ' + navigator.userAgent +
          '<br><br><b>Tip:</b> Screenshot this and send to your developer.';
        logWsodError('error', event.message, msg);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var overlay = document.getElementById('global-error-overlay');
        overlay.style.display = 'block';
        var msg = (event.reason && event.reason.stack ? event.reason.stack : event.reason);
        overlay.innerHTML = '<b>UNHANDLED PROMISE REJECTION</b><br><br>' +
          '<pre style="white-space:pre-wrap;word-break:break-all;">' + msg + '</pre>' +
          '<br><b>URL:</b> ' + window.location.href +
          '<br><b>User Agent:</b> ' + navigator.userAgent +
          '<br><br><b>Tip:</b> Screenshot this and send to your developer.';
        logWsodError('unhandledrejection', event.reason, msg);
      });
      // Hide overlay if React app loads successfully
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var overlay = document.getElementById('global-error-overlay');
          if (window.__REACT_APP_LOADED__) {
            overlay.style.display = 'none';
          }
        }, 2000);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
  </body>
</html>
