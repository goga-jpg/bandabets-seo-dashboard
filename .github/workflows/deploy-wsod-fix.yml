name: Deploy Platform (WSOD Fix)

on:
  workflow_dispatch:
  push:
    branches:
      - platform
    paths:
      - '**.js'
      - '**.jsx'
      - '**.ts'
      - '**.tsx'
      - '**.css'
      - '**.json'
      - '**.md'
      - 'vite.config.js'
      - 'package.json'
      - 'src/**'
      - 'public/**'
      - '.github/workflows/deploy-wsod-fix.yml'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Upload production-ready build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
