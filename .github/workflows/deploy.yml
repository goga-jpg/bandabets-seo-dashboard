name: Build & Deploy

on:
  push:
    branches:
      - platform

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'


      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=https://bandabets-hotgames.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=sb_publishable_CEANsTc885URtiGQydRIfQ_rsULeDde" >> .env

      - name: Build
        run: npm run build

      - name: Zip dist folder
        run: cd dist && zip -r ../BandaBets-SEO-Dashboard.zip . && cd ..

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
